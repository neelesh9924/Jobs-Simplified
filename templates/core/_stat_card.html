{% comment %} Params: icon, label, value, tone (slate|indigo|violet|emerald) {% endcomment %}
<div class="rounded-xl border border-gray-200 bg-white p-4 shadow-card">
  <div class="flex items-center justify-between">
    <span class="text-xs font-medium text-gray-500">{{ label }}</span>
    <span class="flex h-7 w-7 items-center justify-center rounded-lg
      {% if tone == 'indigo' %}bg-brand-50 text-brand-600
      {% elif tone == 'violet' %}bg-violet-50 text-violet-600
      {% elif tone == 'emerald' %}bg-emerald-50 text-emerald-600
      {% else %}bg-gray-100 text-gray-500{% endif %}">
      <i data-lucide="{{ icon }}" class="h-4 w-4"></i>
    </span>
  </div>
  <p class="mt-2 font-mono text-2xl font-semibold tracking-tight text-gray-900">{{ value }}</p>
</div>
