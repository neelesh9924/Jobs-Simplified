{% comment %} Params: name, label, value, options (iterable of strings) {% endcomment %}
<select name="{{ name }}" class="rounded-lg border border-gray-200 bg-white py-2 px-2.5 text-sm text-gray-700 outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100">
  <option value="">All {{ label|lower }}s</option>
  {% for opt in options %}
    <option value="{{ opt }}" {% if value == opt %}selected{% endif %} class="capitalize">{{ opt }}</option>
  {% endfor %}
</select>
